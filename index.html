<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon Jump</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
 body { margin:0; overflow:hidden; background:#000; touch-action:none; font-family:sans-serif; }
 canvas { display:block; background:#02030f; }

/* SCORE */
#score {
 position:fixed; top:15px; left:15px;
 color:#00ff88; font-size:28px; font-weight:bold;
 text-shadow:0 0 10px #00ff88; z-index:50; display:none;
}

/* ✅ BAŞLANGIÇ MENÜSÜ */
#menu {
 position:fixed; inset:0; background:rgba(0,0,0,0.9);
 display:flex; flex-direction:column; justify-content:center; align-items:center;
 z-index:100; gap:25px;
}

#logo {
 font-size:64px; color:#0ff; font-weight:bold;
 text-shadow:0 0 25px #0ff;
}

.colorRow {
 display:flex; gap:15px;
}

.colorPick {
 width:45px; height:45px; border-radius:8px;
 cursor:pointer; box-shadow:0 0 12px #fff3;
 border:2px solid #fff5;
}

#previewBox {
 width:80px; height:80px;
 display:flex; justify-content:center; align-items:center;
}

#startBtn {
 padding:12px 35px; background:#0ff; color:#000;
 border:none; border-radius:10px;
 font-size:24px; font-weight:bold; cursor:pointer;
 box-shadow:0 0 20px #0ff;
}

/* ✅ GAME OVER EKRANI */
#gameOver {
 position:fixed; inset:0;
 background:rgba(0,0,0,0.92);
 display:flex; flex-direction:column;
 justify-content:center; align-items:center;
 z-index:200; gap:25px; display:none;
}

#finalScore {
 font-size:80px; color:#0ff; text-shadow:0 0 25px #0ff;
 font-weight:bold;
}

#retryBtn {
 padding:12px 35px; background:#0ff; color:#000;
 border:none; border-radius:10px;
 font-size:30px; font-weight:bold; cursor:pointer;
 box-shadow:0 0 20px #0ff;
}
</style>
</head>

<body>

<!-- ✅ CANVAS -->
<canvas id="game"></canvas>

<!-- ✅ SKOR -->
<div id="score">0</div>

<!-- ✅ BAŞLANGIÇ MENÜSÜ -->
<div id="menu">
 <div id="logo">Neon Jump</div>

 <div id="previewBox">
   <canvas id="preview" width="80" height="80"></canvas>
 </div>

 <div class="colorRow">
   <div class="colorPick" data-color="#0f0" style="background:#0f0"></div>
   <div class="colorPick" data-color="#f00" style="background:#f00"></div>
   <div class="colorPick" data-color="#00aaff" style="background:#00aaff"></div>
   <div class="colorPick" data-color="#ff0" style="background:#ff0"></div>
   <div class="colorPick" data-color="#a0f" style="background:#a0f"></div>
 </div>

 <button id="startBtn">BAŞLA</button>
</div>

<!-- ✅ GAME OVER -->
<div id="gameOver">
 <div id="finalScore">0</div>
 <button id="retryBtn">YENİDEN OYNA</button>
</div>

<script>
// =========================================================
// CANVAS SETUP
// =========================================================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let spacing, PLATFORM_COUNT, jumpForce, baseJump;
let platformWidth, platformHeight;

// Karakter rengi
let characterColor = "#0f0";

// UI
const menu = document.getElementById("menu");
const scoreUI = document.getElementById("score");
const gameOverUI = document.getElementById("gameOver");
const finalScoreUI = document.getElementById("finalScore");
const retryBtn = document.getElementById("retryBtn");

// Önizleme canvas
const preview = document.getElementById("preview");
const pctx = preview.getContext("2d");

function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;

    spacing = canvas.height * 0.12;
    PLATFORM_COUNT = Math.floor(canvas.height / spacing) + 4;

    jumpForce = -canvas.height * 0.023;
    baseJump = jumpForce;

    platformWidth = canvas.width * 0.18;
    platformHeight = canvas.height * 0.018;
}
resize();
onresize = resize;

// =========================================================
// PLAYER
// =========================================================
let player = {
 x: innerWidth/2 - 25,
 y: innerHeight/2,
 w: canvas.width * 0.06,
 h: canvas.width * 0.06,
 vx: 0, vy: 0,
 squash: 1,
 dir: 1
};

// =========================================================
// WORLD
// =========================================================
let platforms = [];
let particles = [];
let scorePops = [];
let score = 0;

// =========================================================
// ROUND RECT
// =========================================================
function roundRect(x,y,w,h,r){
 ctx.beginPath();
 ctx.moveTo(x+r,y);
 ctx.lineTo(x+w-r,y);
 ctx.quadraticCurveTo(x+w,y,x+w,y+r);
 ctx.lineTo(x+w,y+h-r);
 ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
 ctx.lineTo(x+r,y+h);
 ctx.quadraticCurveTo(x,y+h,x,y+h-r);
 ctx.lineTo(x,y+r);
 ctx.quadraticCurveTo(x,y,x+r,y);
 ctx.closePath();
}

// =========================================================
// PLATFORM GENERATION
// =========================================================
function randomType(){
 let r = Math.random();
 if(r < 0.08) return "deadly";
 if(r < 0.20) return "break";
 if(r < 0.35) return "moving";
 return "normal";
}

function createPlatforms(){
 platforms = [];
 let y = canvas.height - platformHeight*4;

 platforms.push({
  x:0, y:y, w:canvas.width, h:platformHeight,
  type:"start", scored:false, hits:0, speed:0
 });

 y -= spacing;

 for(let i=1;i<PLATFORM_COUNT;i++){
  platforms.push({
   x: Math.random()*(canvas.width - platformWidth),
   y: y,
   w: platformWidth,
   h: platformHeight,
   type: randomType(),
   scored:false,
   hits:0,
   speed: Math.random()>0.75 ? (Math.random()*1.4 + 0.4) : 0
  });
  y -= spacing;
 }
}

// =========================================================
// PARTICLES
// =========================================================
function spawnParticles(x,y,color,count=12,speed=2){
 for(let i=0;i<count;i++){
  particles.push({
   x,y,
   vx:(Math.random()-0.5)*speed,
   vy:(Math.random()-1)*speed,
   alpha:1,
   size:Math.random()*3+2,
   color
  });
 }
}

function updateParticles(){
 particles = particles.filter(p=>p.alpha>0.05);
 particles.forEach(p=>{
  ctx.save();
  ctx.globalAlpha = p.alpha;
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
  p.x += p.vx;
  p.y += p.vy;
  p.vy += 0.04;
  p.alpha -= 0.03;
 });
}

// =========================================================
// SCORE POPS
// =========================================================
function addScorePop(x,y){
 scorePops.push({x,y,alpha:1});
}

function updateScorePops(){
 scorePops = scorePops.filter(p=>p.alpha>0.05);
 scorePops.forEach(p=>{
  ctx.save();
  ctx.globalAlpha = p.alpha;
  ctx.fillStyle="#00ff88";
  ctx.font="bold 28px Arial";
  ctx.fillText("+1", p.x, p.y);
  ctx.restore();
  p.y -= 1;
  p.alpha -= 0.03;
 });
}

// =========================================================
// DRAW PLAYER
// =========================================================
function drawPlayer(){
 ctx.save();
 let tilt = player.vx * 0.05;

 ctx.translate(player.x+player.w/2, player.y+player.h/2);
 ctx.rotate(tilt);
 ctx.scale(1, player.squash);
 ctx.translate(-(player.x+player.w/2), -(player.y+player.h/2));

 ctx.fillStyle = characterColor;
 ctx.shadowBlur=18;
 ctx.shadowColor=characterColor;
 roundRect(player.x,player.y,player.w,player.h,14);
 ctx.fill();
 ctx.shadowBlur=0;

 ctx.fillStyle="#fff";
 ctx.fillRect(player.x+player.w*0.24,player.y+player.h*0.3,player.w*0.18,player.h*0.18);
 ctx.fillRect(player.x+player.w*0.6,player.y+player.h*0.3,player.w*0.18,player.h*0.18);

 ctx.fillStyle="yellow";
 if(player.dir===1) ctx.fillRect(player.x+player.w*0.96,player.y+player.h*0.52,player.w*0.2,player.h*0.12);
 else ctx.fillRect(player.x-player.w*0.16,player.y+player.h*0.52,player.w*0.2,player.h*0.12);

 ctx.restore();
}

// =========================================================
// DRAW PLATFORMS
// =========================================================
function drawPlatforms(){
 platforms.forEach(p=>{
  if(p.type==="normal") ctx.fillStyle="#0af";
  if(p.type==="break") ctx.fillStyle="#fa0";
  if(p.type==="deadly") ctx.fillStyle="#f00";
  if(p.type==="moving") ctx.fillStyle="#a0f";
  if(p.type==="start") ctx.fillStyle="#0f0";

  ctx.shadowBlur=10;
  ctx.shadowColor=ctx.fillStyle;
  ctx.fillRect(p.x,p.y,p.w,p.h);
 });
 ctx.shadowBlur=0;
}

// =========================================================
// GAME LOOP
// =========================================================
let gameRunning = false;

function update(){
 if(!gameRunning) return requestAnimationFrame(update);

 ctx.clearRect(0,0,canvas.width,canvas.height);

 player.vy += 0.4;
 player.y += player.vy;
 player.x += player.vx;

 // ✅ Telefon hassasiyeti daha kaygan olsun
 player.vx *= 0.94;

 if(player.vx>0.2) player.dir=1;
 if(player.vx<-0.2) player.dir=-1;

 if(player.x < -player.w) player.x = canvas.width;
 if(player.x > canvas.width) player.x = -player.w;

 platforms.forEach(p=>{
  if(p.type==="moving"){
   p.x += p.speed;
   if(p.x < 0 || p.x + p.w > canvas.width){
    p.speed *= -1;
   }
  }
 });

 platforms.forEach(p=>{
  if(
   player.vy > 0 &&
   player.x+player.w > p.x &&
   player.x < p.x+p.w &&
   player.y+player.h > p.y &&
   player.y+player.h < p.y+p.h+18
  ){

   if(p.type==="deadly"){ return gameOver(); }

   player.vy = jumpForce;
   player.squash = 0.75;
   spawnParticles(player.x+player.w/2, player.y+player.h, characterColor, 12, 3);

   if(!p.scored && p.type!=="start"){
    score++;
    scoreUI.innerText = score;
    addScorePop(player.x + player.w/2, player.y);
    p.scored = true;
   }

   if(p.type==="break"){
    p.hits++;
    spawnParticles(p.x+p.w/2, p.y, "#fa0", 10, 3);
    if(p.hits>=2) p.y = 99999;
   }
  }
 });

 if(player.y > canvas.height+150){
  return gameOver();
 }

 player.squash += (1 - player.squash)*0.1;

 if(player.y < canvas.height*0.45){
  let diff = canvas.height*0.45 - player.y;
  player.y = canvas.height*0.45;
  platforms.forEach(p=>p.y+=diff);
  particles.forEach(p=>p.y+=diff);
  scorePops.forEach(po=>po.y+=diff);
 }

 if(platforms[platforms.length-1].y > spacing){
  let last = platforms[platforms.length-1].y;
  platforms.push({
   x:Math.random()*(canvas.width - platformWidth),
   y:last-spacing,
   w:platformWidth,h:platformHeight,
   type:randomType(),
   scored:false,
   hits:0,
   speed: Math.random()>0.75 ? (Math.random()*1.3+0.5) : 0
  });
 }

 platforms = platforms.filter(p=>p.y < canvas.height+200);

 drawPlatforms();
 updateParticles();
 updateScorePops();
 drawPlayer();

 requestAnimationFrame(update);
}
update();

// =========================================================
// GAME OVER
// =========================================================
function gameOver(){
 gameRunning = false;
 scoreUI.style.display = "none";
 finalScoreUI.innerText = score;
 gameOverUI.style.display = "flex";
}

retryBtn.onclick = ()=>{
 gameOverUI.style.display = "none";
 startGame();
};

// =========================================================
// START GAME
// =========================================================
function startGame(){
 score = 0;
 scoreUI.innerText = "0";
 scoreUI.style.display = "block";

 player.x = innerWidth/2 - 25;
 player.y = innerHeight/2;
 player.vx = 0;
 player.vy = 0;
 player.squash = 1;

 createPlatforms();

 gameRunning = true;
}

// =========================================================
// CONTROLS
// =========================================================
document.addEventListener("keydown", e=>{
 if(e.key==="ArrowLeft") player.vx=-6;
 if(e.key==="ArrowRight") player.vx=6;
});

let touchX=null;

document.addEventListener("touchstart",e=>{
 touchX = e.touches[0].clientX;
});

document.addEventListener("touchmove",e=>{
 player.vx = (e.touches[0].clientX - touchX) * 0.40; // ✅ HASSASİYET ARTTIRILDI
 touchX = e.touches[0].clientX;
});

// =========================================================
// ✅ BAŞLANGIÇ MENÜSÜ – RENK SEÇİMİ
// =========================================================
document.querySelectorAll(".colorPick").forEach(btn=>{
 btn.onclick = ()=>{
   characterColor = btn.dataset.color;
 };
});

// =========================================================
// ✅ MENÜDE KARAKTER ÖNİZLEME ANİMASYONU
// =========================================================
let pvY = 40, pvVy = 0;

function drawPreview(){
 pctx.clearRect(0,0,80,80);
 pvVy += 0.3;
 pvY += pvVy;
 if(pvY > 55){ pvY = 55; pvVy = -6; }

 pctx.fillStyle = characterColor;
 pctx.shadowBlur = 15;
 pctx.shadowColor = characterColor;
 pctx.beginPath();
 pctx.roundRect(20, pvY, 40, 40, 10);
 pctx.fill();
 pctx.shadowBlur = 0;

 requestAnimationFrame(drawPreview);
}
drawPreview();

// =========================================================
// ✅ BAŞLAT BUTONU
// =========================================================
document.getElementById("startBtn").onclick = ()=>{
 menu.style.display = "none";
 startGame();
};
</script>

</body>
</html>
